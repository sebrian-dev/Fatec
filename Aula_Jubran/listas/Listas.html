<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Listas</title>
    <style>
      h1 {
        font-family: Algerian;
        font-size: 35pt;
        color: orange;
        text-shadow: 2px 2px 2px black;
      }
    </style>
    <!--Colocando efeito nos títulos-->
  </head>
  <body>
    <h1>Campeões (Lista Ordenada)</h1>
    <!--Esta é uma lista mumerada-->
    <ol>
      <li>Corinthians</li>
      <li>Palmeiras</li>
      <li>São Paulo</li>
      <li>Santos</li>
    </ol>
    <h1>Supermercado (Lista Não Ordenada)</h1>
    <!--Esta é uma lista com marcador-->
    <ul>
      <li>Pão</li>
      <li>Alface</li>
      <li>Tomate</li>
      <li>Queijo</li>
    </ul>
    <h1>Dicionário (Lista de Definição)</h1>
    <dl>
      <dt>HTML</dt>
      <dd>Linguagem de Marcação de HiperTexto</dd>
      <dt>Marcação</dt>
      <dd>Ato ou efeito de marcar</dd>
    </dl>
  </body>
</html>
